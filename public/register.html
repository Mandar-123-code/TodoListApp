<!doctype html>
<html>
  <head>
    <title>Register</title>
    <link rel="icon" type="image/png" href="./registericon.png">
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #f1f5f9;
        font-family: sans-serif;
      }
      .card {
        background: white;
        padding: 30px;
        border-radius: 10px;
        width: 300px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      }
      input {
        width: 100%;
        padding: 10px;
        margin-bottom: 10px;
        border-radius: 10px;
        border: 2px solid lightblue;
      }
      button {
        width: 100%;
        padding: 10px;
        background: #6366f1;
        color: white;
        border: none;
        cursor: pointer;
        border-radius: 10px;
      }
      a {
        display: block;
        margin-top: 10px;
        text-align: center;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2 style="text-align: center; color: darkslategrey">Register</h2>
      <input
        type="text"
        id="username"
        placeholder="Username"
        value=""
        required
      />
      <input
        type="password"
        id="password"
        placeholder="Password"
        value=""
        required
      />
      <button onclick="register()">Register</button>
      <a href="/login.html">Already have account? Login</a>
    </div>

    <script src="auth.js"></script>
  </body>
</html>
