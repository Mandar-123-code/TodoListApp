<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="./todoicon.png" />
    <title>Modern Todo App</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }

      :root {
        --bg: #f1f5f9;
        --card: #ffffff;
        --text: #1e293b;
        --primary: #6366f1;
        --danger: #ef4444;
        --success: #22c55e;
      }

      .dark {
        --bg: #0f172a;
        --card: #1e293b;
        --text: #f1f5f9;
      }

      body {
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }
      .navbar {
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        padding: 18px 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: white;
        border-radius: 0px 0px 20px 20px;
      }

      .navbar button {
        background: black;
        border: none;
        padding: 8px 15px;
        border-radius: 20px;
        cursor: pointer;
        font-weight: 600;
        color: white;
      }

      .container {
        max-width: 650px;
        margin: 50px auto;
        background: var(--card);
        padding: 30px;
        border-radius: 18px;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
      }

      input[type="text"] {
        width: 100%;
        padding: 12px;
        margin-bottom: 12px;
        border-radius: 8px;
        border: 1px solid #ccc;
        outline: none;
      }

      input:focus {
        border-color: var(--primary);
      }

      #addBtn {
        width: 100%;
        padding: 12px;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
      }
      .todo-item {
        background: var(--bg);
        padding: 20px;
        margin-top: 20px;
        border-radius: 15px;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
      }

      .todo-title {
        font-size: 18px;
        font-weight: 700;
        margin-bottom: 8px;
      }

      .todo-desc {
        margin-bottom: 10px;
      }

      .status {
        font-weight: 600;
        margin-bottom: 10px;
      }

      .completed {
        color: var(--success);
      }
      .pending {
        color: var(--danger);
      }

      .todo-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .todo-actions button {
        padding: 6px 12px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
        color: white;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        user-select: none;
      }

      .delete-btn {
        background: var(--danger);
      }
      .update-btn {
        background: var(--success);
      }
      .edit-btn {
        background: #6b7280;
      }
      .save-btn {
        background: var(--primary);
      }
      .cancel-btn {
        background: #64748b;
      }
      #spinner {
        text-align: center;
        margin-top: 20px;
        display: none;
      }
      #toast {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: black;
        color: white;
        padding: 10px 15px;
        border-radius: 8px;
        display: none;
      }

      .empty-message {
        text-align: center;
        margin-top: 20px;
        opacity: 0.7;
      }
      .modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        display: none;
        justify-content: center;
        align-items: center;
      }

      .modal-content {
        background: var(--card);
        padding: 25px;
        border-radius: 10px;
        text-align: center;
        color: var(--text);
        max-width: 90%;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      }

      .modal-actions {
        margin-top: 20px;
        display: flex;
        justify-content: center;
        gap: 15px;
      }

      .modal-actions button {
        padding: 12px 25px;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        border: 1px solid transparent;
        display: inline-flex;
        justify-content: center;
        align-items: center;
        user-select: none;
        transition: all 0.2s ease;
      }

      #confirmYes {
        background: var(--success);
        color: white;
        border-color: #16a34a;
      }
      #confirmNo {
        background: var(--danger);
        color: white;
        border-color: #b91c1c;
      }

      .modal-actions button:hover {
        opacity: 0.85;
      }
    </style>
  </head>

  <body>
    <div id="confirmModal" class="modal">
      <div class="modal-content">
        <p>Are you sure you want to delete this todo?</p>
        <div class="modal-actions">
          <button id="confirmYes" type="button">Yes</button>
          <button id="confirmNo" type="button">Cancel</button>
        </div>
      </div>
    </div>
    <div class="navbar">
      <h2 style="color: antiquewhite">Todo List App</h2>
      <div class="navbar-right">
        <button onclick="toggleDark()" id="darkModeBtn">🌙 Dark Mode</button>
      </div>
    </div>

    <div class="container">
      <input
        type="text"
        id="todotitle"
        placeholder="Enter Title"
        required
        value=""
      />
      <input
        type="text"
        id="tododescription"
        placeholder="Enter Description"
        required
        value=""
      />
      <button id="addBtn">Add Todo</button>

      <div id="spinner">Loading...</div>
      <div id="todoList"></div>
    </div>

    <div id="toast"></div>

    <script src="./script.js"></script>
  </body>
</html>
